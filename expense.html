<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="design.css">
</head>
<body>

<div class="container">

    <h1>Personal Expense Tracker</h1>

    <div class="cards">
        <div class="card">
            <h3>Income</h3>
            <p id="income">₹0</p>
        </div>

        <div class="card">
            <h3>Expense</h3>
            <p id="expense">₹0</p>
        </div>

        <div class="card">
            <h3>Balance</h3>
            <p id="balance">₹0</p>
        </div>
    </div>

    <div class="form-box">

        <input type="text" id="name" placeholder="Description">

        <input type="number" id="amount" placeholder="Amount">

        <button id="incomeBtn">➕ Add Income</button>

        <button id="expenseBtn">➖ Add Expense</button>

    </div>

    <div class="history">
        <h2>History</h2>
        <ul id="list"></ul>
    </div>

</div>

<script src="tracker.js"></script>

</body>
</html>
